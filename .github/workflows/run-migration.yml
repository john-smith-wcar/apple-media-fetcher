name: run-migration
on:
  workflow_dispatch:
jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install httpx
      - name: Run migration SQL via Supabase Management API
        run: |
          python -c "
import httpx, os
sql = open('migrations/001_initial.sql').read() + '\n' + open('migrations/002_unique_snapshot.sql').read()
resp = httpx.post(
    'https://api.supabase.com/v1/projects/sklucwepsozswptaiezq/sql',
    headers={'Authorization': f'Bearer {os.environ[\"SUPABASE_KEY\"]}', 'Content-Type': 'application/json'},
    json={'query': sql},
)
resp.raise_for_status()
print('Migration OK')
"
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
