name: run-migration
on:
  workflow_dispatch:
jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run migration
        run: |
          host db.sklucwepsozswptaiezq.supabase.co
          nslookup db.sklucwepsozswptaiezq.supabase.co 2>&1 || true
          PGPASSWORD="${{ secrets.SUPABASE_PASSWORD }}" psql -h db.sklucwepsozswptaiezq.supabase.co -p 5432 -U postgres -d postgres sslmode=require -f migrations/001_initial.sql
